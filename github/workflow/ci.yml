name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - 'front/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - 'front/**'

jobs:
  lint-mobile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: mobile

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: mobile

  lint-front:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: front

  build-web-front:
    runs-on: ubuntu-latest
    needs: lint-front
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: front

      - name: Build Web (Vite)
        run: npm run build
        working-directory: front

  build-web-mobile:
    runs-on: ubuntu-latest
    needs: lint-mobile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: mobile

      - name: Build Web (Expo)
        run: npx expo export --platform web
        working-directory: mobile

  build-android:
    runs-on: ubuntu-latest
    needs: lint-mobile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: mobile

      - name: Build Android
        run: npx expo run:android --no-install --variant release
        working-directory: mobile

  build-ios:
    runs-on: macos-latest
    needs: lint-mobile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: mobile

      - name: Build iOS
        run: npx expo run:ios --no-install
        working-directory: mobile